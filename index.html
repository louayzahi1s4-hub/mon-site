<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Retro Game Hub - Flappy Bird</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LEFT MENU -->
  <div class="menu">
    <h1>🎮 RETRO GAME HUB</h1>

    <h2>CHOOSE GAME</h2>

    <button onclick="startGame()">🐦 FLAPPY BIRD</button>

    <p class="hint">SPACE or CLICK to jump</p>
  </div>

  <!-- GAME AREA -->
  <div class="game-area">
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="game" width="400" height="600"></canvas>
  </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = { x: 80, y: 200, velocity: 0 };
let gravity = 0.5;
let jump = -8;

let pipes = [];
let score = 0;
let gameStarted = false;

/* START GAME */
function startGame(){
  if(gameStarted) return;
  gameStarted = true;
  loop();
}

/* CONTROLS */
document.addEventListener("keydown", e => {
  if(e.code === "Space") bird.velocity = jump;
});

document.addEventListener("click", () => {
  bird.velocity = jump;
});

/* CREATE PIPES */
function createPipe(){
  let gap = 140;
  let top = Math.random() * 300 + 50;

  pipes.push({
    x: 400,
    top: top,
    bottom: top + gap
  });
}

/* GAME LOOP */
function loop(){

  ctx.clearRect(0,0,400,600);

  /* SKY */
  ctx.fillStyle = "#70c5ce";
  ctx.fillRect(0,0,400,600);

  /* BIRD */
  bird.velocity += gravity;
  bird.y += bird.velocity;

  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, 20, 20);

  /* PIPES */
  ctx.fillStyle = "green";

  pipes.forEach((p,i) => {
    p.x -= 2;

    ctx.fillRect(p.x, 0, 60, p.top);
    ctx.fillRect(p.x, p.bottom, 60, 600);

    /* COLLISION */
    if(
      bird.x < p.x + 60 &&
      bird.x + 20 > p.x &&
      (bird.y < p.top || bird.y > p.bottom)
    ){
      alert("Game Over! Score: " + score);
      location.reload();
    }

    /* SCORE */
    if(p.x === 60){
      score++;
      document.getElementById("score").innerText = score;
    }
  });

  /* REMOVE OLD PIPES */
  if(pipes.length === 0 || pipes[pipes.length-1].x < 200){
    createPipe();
  }

  /* FLOOR / CEILING */
  if(bird.y > 580 || bird.y < 0){
    alert("Game Over! Score: " + score);
    location.reload();
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
